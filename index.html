<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام الجرد الاحترافي - الإصدار النهائي</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
    :root { --p-blue: #1a56db; --p-dark: #0a1628; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: Arial, sans-serif; background: var(--p-dark); color: #f8fafc; direction: rtl; }
    .app { max-width: 1200px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
    header { display: flex; align-items: center; padding: 20px; background: rgba(255,255,255,.06); border-radius: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,.1); }
    .tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; }
    .tab { flex: 1; padding: 12px; border: none; border-radius: 12px; background: rgba(255,255,255,.05); color: #94a3b8; font-weight: bold; cursor: pointer; white-space: nowrap; }
    .tab.active { background: var(--p-blue); color: #fff; }
    .panel { display: none; } .panel.active { display: block; }
    .card { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 18px; padding: 20px; margin-bottom: 15px; }
    .sinp { width: 100%; padding: 15px; background: rgba(26,86,219,0.1); border: 2px solid var(--p-blue); border-radius: 12px; color: #fff; font-size: 18px; text-align: center; outline: none; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { padding: 12px; background: rgba(26,86,219,0.2); font-size: 11px; }
    td { padding: 10px; text-align: center; font-size: 12px; border-bottom: 1px solid rgba(255,255,255,.05); }
    .btn-d { background: rgba(239,68,68,0.15); color: #ef4444; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; }
</style>
</head>
<body>
<div class="app">
    <header><h1>📦 نظام الجرد الذكي</h1></header>

    <div class="tabs">
        <button class="tab active" onclick="sw('scan')">🔍 السكانر</button>
        <button class="tab" onclick="sw('inv')">📋 الجرد</button>
        <button class="tab" onclick="sw('stock')">📦 المرجع</button>
        <button class="tab" onclick="sw('cmp')">⚖️ المقارنة</button>
        <button class="tab" onclick="sw('db')">🗄️ القاعدة</button>
    </div>

    <div class="panel active" id="p-scan">
        <div class="card">
            <div id="reader"></div>
            <input class="sinp" id="si" placeholder="امسح الباركود أو رقم الصنف..." autocomplete="off">
            <div id="status" style="text-align:center; margin-top:15px; font-weight:bold;"></div>
        </div>
    </div>

    <div class="panel" id="p-stock">
        <div class="card">
            <h3>رفع ملف المرجع (الكميات)</h3>
            <p style="font-size:12px; color:#fbbf24; margin-bottom:10px;">⚠️ سيتم سحب الكمية فقط من عمود "الفعلي النهائي".</p>
            <input type="file" onchange="processFile(this, 'stock')">
            <table id="table-stock"><thead><tr><th>المعرف</th><th>الاسم</th><th>الفعلي النهائي</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div class="panel" id="p-inv">
        <div class="card">
            <div style="display:flex; justify-content:space-between;">
                <h3>سجل الجرد</h3>
                <button class="btn-d" onclick="clearStore('inventory')">مسح</button>
            </div>
            <table id="table-inv"><thead><tr><th>المعرف</th><th>الاسم</th><th>الكمية</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div class="panel" id="p-cmp">
        <div class="card">
            <h3>⚖️ تقرير الفروقات</h3>
            <table id="table-cmp"><thead><tr><th>الصنف</th><th>النظام</th><th>الجرد</th><th>الفرق</th></tr></thead><tbody></tbody></table>
        </div>
    </div>

    <div class="panel" id="p-db">
        <div class="card">
            <h3>قاعدة البيانات الرئيسية</h3>
            <input type="file" onchange="processFile(this, 'products')">
            <button class="btn-d" onclick="clearStore('products')" style="margin-top:10px;">مسح القاعدة</button>
        </div>
    </div>
</div>

<script>
let db;
const req = indexedDB.open("FinalJardSystem", 1);
req.onupgradeneeded = (e) => {
    db = e.target.result;
    db.createObjectStore("products", {keyPath:"id", autoIncrement:true}).createIndex("barcode","barcode");
    db.createObjectStore("inventory", {keyPath:"key"});
    db.createObjectStore("stock", {keyPath:"key"});
};
req.onsuccess = (e) => { db = e.target.result; updateUI(); };

// تحليل التكرار لتجاهل اسم المتجر
function getBlacklist(rows) {
    const counts = {};
    rows.forEach(r => r.forEach(c => {
        let v = String(c||'').trim();
        if(v && /[a-zA-Z\u0600-\u06FF]/.test(v)) counts[v] = (counts[v]||0)+1;
    }));
    return Object.keys(counts).filter(k => counts[k] > 10);
}

async function processFile(input, storeName) {
    const file = input.files[0]; if(!file) return;
    const buffer = await file.arrayBuffer();
    const wb = XLSX.read(buffer);
    const sheet = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(sheet, {header:1});
    
    // تحديد رقم عمود "الفعلي النهائي"
    let targetColIndex = -1;
    if (rows.length > 0) {
        targetColIndex = rows[0].findIndex(cell => String(cell).trim() === "الفعلي النهائي");
    }

    const blacklist = getBlacklist(rows);
    const tx = db.transaction(storeName, "readwrite");
    const store = tx.objectStore(storeName);

    rows.forEach((row, index) => {
        if(index === 0) return; // تخطي الترويسة
        let d = { barcode:"", item_no:"", name:"", qty:0 };
        
        row.forEach((cell, idx) => {
            let val = String(cell||'').trim();
            if(!val || blacklist.includes(val)) return;

            // منطق رقم الصنف (أرقام فقط + داش + طول > 12)
            const digits = val.replace(/-/g, '');
            if(val.includes('-') && /^\d+$/.test(digits) && digits.length > 12) d.item_no = val;
            // منطق الباركود (أرقام فقط + طول > 6)
            else if(/^\d+$/.test(val) && val.length > 6) d.barcode = val;
            // منطق الاسم
            else if(/[a-zA-Z\u0600-\u06FF]/.test(val)) d.name = val;

            // جلب الكمية حصراً من العمود المحدد
            if(storeName === 'stock' && idx === targetColIndex) {
                d.qty = parseFloat(cell) || 0;
            }
        });

        if(d.item_no || d.barcode) {
            if(storeName === 'products') store.put(d);
            else store.put({ key: d.item_no || d.barcode, name: d.name, qty: d.qty });
        }
    });
    tx.oncomplete = () => { 
        if(storeName === 'stock' && targetColIndex === -1) alert("⚠️ لم يتم العثور على عمود باسم 'الفعلي النهائي'");
        else alert("✅ تم الرفع بنجاح");
        updateUI(); 
    };
}

// نظام السكانر
document.getElementById('si').onkeypress = async (e) => {
    if (e.key === 'Enter') {
        const val = e.target.value.trim();
        const tx = db.transaction(["products", "inventory"], "readwrite");
        const prods = await new Promise(r => tx.objectStore("products").getAll().onsuccess = ev => r(ev.target.result));
        const match = prods.find(p => p.barcode === val || p.item_no === val);

        if (match) {
            const inv = tx.objectStore("inventory");
            const key = match.item_no || match.barcode;
            const exist = await new Promise(r => inv.get(key).onsuccess = ev => r(ev.target.result));
            if (exist) { exist.qty++; inv.put(exist); }
            else { inv.put({ key: key, name: match.name, qty: 1 }); }
            document.getElementById('status').innerHTML = `<span style="color:#10b981">✅ ${match.name}</span>`;
        } else {
            document.getElementById('status').innerHTML = `<span style="color:#ef4444">❌ غير مسجل</span>`;
        }
        e.target.value = ""; updateUI();
    }
};

async function updateUI() {
    if(!db) return;
    const tx = db.transaction(["products", "inventory", "stock"], "readonly");
    const inv = await new Promise(r => tx.objectStore("inventory").getAll().onsuccess = e => r(e.target.result));
    document.getElementById('table-inv').querySelector('tbody').innerHTML = inv.map(i => `<tr><td>${i.key}</td><td>${i.name}</td><td>${i.qty}</td></tr>`).join('');
    
    const stock = await new Promise(r => tx.objectStore("stock").getAll().onsuccess = e => r(e.target.result));
    document.getElementById('table-stock').querySelector('tbody').innerHTML = stock.map(s => `<tr><td>${s.key}</td><td>${s.name}</td><td>${s.qty}</td></tr>`).join('');

    const allKeys = new Set([...inv.map(i => i.key), ...stock.map(s => s.key)]);
    document.getElementById('table-cmp').querySelector('tbody').innerHTML = [...allKeys].map(k => {
        const i = inv.find(x => x.key === k); const s = stock.find(x => x.key === k);
        const qi = i ? i.qty : 0; const qs = s ? s.qty : 0;
        return `<tr><td>${k}<br><small>${(i||s).name}</small></td><td>${qs}</td><td>${qi}</td><td style="color:${qi-qs<0?'#ef4444':'#10b981'}">${qi-qs}</td></tr>`;
    }).join('');
}

function sw(id) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('p-'+id).classList.add('active');
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
}
function clearStore(s) { if(confirm("حذف؟")) db.transaction(s, "readwrite").objectStore(s).clear().oncomplete = () => updateUI(); }

window.onload = () => {
    const sc = new Html5QrcodeScanner("reader", { fps: 15, qrbox: 250 });
    sc.render(t => { document.getElementById('si').value = t; document.getElementById('si').dispatchEvent(new KeyboardEvent('keypress',{'key':'Enter'})); });
};
</script>
</body>
</html>
